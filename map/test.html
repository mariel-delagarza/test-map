<style>
  /* CSS */

  .frame-container {
    position: relative;
    padding-bottom: 56.25%;
    padding-top: 35px;
    height: 0;
    overflow: hidden;
  }

  .iframe-button {
    position: absolute;
    top: 0;
    right: 11px;
    color: #fcfcfc;
    margin-top: 20px;
    background-color: #222;
    border-radius: 2px;
    border-style: none;
    box-sizing: border-box;
    cursor: pointer;
    display: block;
    font-family: "Synthese", Arial, sans-serif;
    font-size: 1rem;
    font-weight: bold;
    line-height: 1.5;
    max-width: 160px;
    min-height: 44px;
    min-width: 10px;
    outline: none;
    overflow: hidden;
    padding: 10px;
    text-align: center;
    text-decoration: none;
    width: 100%;
    z-index: 999;
  }

  .iframe-button:hover,
  .iframe-button:focus {
    opacity: 0.75;
  }

  #map-frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
<div>
  <div class="frame-container">
    <button class="full-screen display-none" onclick="fullScreenHandler()">
      View full-screen
    </button>
    <iframe
      title="Russian and Ukrainian Force Disposition"
      id="map-frame"
      src="https://mariel-delagarza.github.io/test-map/map/"
      name="tnt-russia-btg-map"
      scrolling="no"
      frameborder="0"
      marginheight="0px"
      marginwidth="0px"
      height="700px"
      width="1100px"
      allowfullscreen
    ></iframe>
  </div>
</div>

<script>
  let viewFullScreenButton = document.querySelector(".full-screen");

  // window width for using desktop CSS
  const desktop = 1075;

  // observe window resize
  window.addEventListener("resize", resizeHandler);

  // initial call
  resizeHandler();

  // calculate size
  function resizeHandler() {
    // get window width
    const windowInnerWidth = window.innerWidth;

    if (windowInnerWidth >= desktop) {
      if (
        typeof mapFrame != "undefined" &&
        mapFrame != null &&
        $("iframe")[0].clientWidth >= desktop
      ) {
        console.log("desktop");
        console.log($("iframe")[0].clientWidth);
        viewFullScreenButton.classList.remove("full-screen-mobile");
        viewFullScreenButton.classList.remove("display-none");
        viewFullScreenButton.classList.add("display-block");
        viewFullScreenButton.classList.add("iframe");
      }
    }

    if (windowInnerWidth < desktop) {
      if (
        typeof mapFrame != "undefined" &&
        mapFrame != null &&
        $("iframe")[0].clientWidth < desktop
      ) {
        console.log($("iframe")[0].clientWidth);
        viewFullScreenButton.classList.remove("display-none");
        viewFullScreenButton.classList.add("display-block");
        viewFullScreenButton.classList.add("full-screen-mobile");
        viewFullScreenButton.classList.remove("iframe");
      }
    }
  }
</script>
